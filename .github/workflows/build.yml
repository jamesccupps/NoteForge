name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout code
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@1e60f620b9541d16bece96c5465dc8ee9832be0b # v4.0.3
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile JSX
        run: npx babel app.jsx --out-file app.js --presets=@babel/preset-react

      # Only the Node 22 job publishes the release artifacts.
      # Node 20 is build-tested only, to catch incompatibilities without racing to publish.
      - name: Build (test only, Node 20)
        if: matrix.node-version == 20
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --win

      - name: Build and publish (Node 22)
        if: matrix.node-version == 22
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --win --publish always
